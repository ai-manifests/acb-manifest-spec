# .gitea/workflows/validate-acb.yml
# Copy this file into your journal repo to validate ACB entries on every push.

name: Validate ACB Entries

on:
  push:
    paths:
      - '**/*.acb.json'
      - '**/*.acb.jsonl'
      - '**/budget-*.json'
      - '**/settlement-*.json'

jobs:
  validate:
    runs-on: linux
    steps:
      - name: Checkout
        run: |
          git clone "${{ github.server_url }}/${{ github.repository }}.git" .
          git checkout ${{ github.sha }}

      - name: Install acb-validate
        run: npm install -g acb-validate

      - name: Validate ACB entries against schema
        run: |
          find . \( -name '*.acb.json' -o -name 'budget-*.json' -o -name 'settlement-*.json' \) \
            -exec acb-validate {} \;
